spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_manager?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=${PORT:9090}

# JWT Configuration
expense.app.jwtSecret=${EXPENSE_APP_JWT_SECRET:mySecretKey1234567890123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890}
expense.app.jwtExpirationMs=${EXPENSE_APP_JWT_EXPIRATION_MS:86400000}
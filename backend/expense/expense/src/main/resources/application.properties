spring.datasource.url=${SPRING_DATABASE_URL:jdbc:h2:mem:expense_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Local fallback driver (H2 in-memory), overrides when SPRING_DATABASE_URL is set (Railway/Postgres)
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
server.port=${PORT:9090}

# JWT Configuration
expense.app.jwtSecret=${EXPENSE_APP_JWT_SECRET:mySecretKey1234567890123456789012345678901234567890}
expense.app.jwtExpirationMs=${EXPENSE_APP_JWT_EXPIRATION_MS:86400000}


